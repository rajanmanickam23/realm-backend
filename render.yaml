databases:
  - name: realm-db
    databaseName: realm_solutions_db
    user: postgres
    plan: free

services:
  - type: web
    name: realm-backend
    env: docker
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: realm-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: realm-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: realm-db
          property: password
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
